<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIOps Predictive Maintenance Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .dashboard {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
            border: 1px solid #334155;
        }
        h2 {
            margin-top: 0;
            color: #38bdf8;
            font-size: 24px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #94a3b8;
        }
        input {
            width: 100%;
            padding: 10px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0284c7;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0369a1;
        }
        #status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
            display: none;
        }
        .success { background-color: #064e3b; color: #34d399; border: 1px solid #047857; }
        .error { background-color: #7f1d1d; color: #fca5a5; border: 1px solid #b91c1c; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>AIOps Drive Diagnostic Portal</h2>
    <form id="telemetryForm">
        
        <div class="form-group">
            <label for="serial">Drive Serial Number</label>
            <input type="text" id="serial" required placeholder="e.g. SN-DEMO-9999">
        </div>

        <div class="form-group">
            <label>Reallocated Sectors (SMART 5)</label>
            <input type="number" id="smart_5" required value="200">
        </div>

        <div class="form-group">
            <label>Power-On Hours (SMART 9)</label>
            <input type="number" id="smart_9" required value="60000">
        </div>

        <div class="form-group">
            <label>Uncorrectable Errors (SMART 187)</label>
            <input type="number" id="smart_187" required value="50">
        </div>

        <div class="form-group">
            <label>Temperature °C (SMART 194)</label>
            <input type="number" id="smart_194" required value="45">
        </div>

        <div class="form-group">
            <label>Pending Sectors (SMART 197)</label>
            <input type="number" id="smart_197" required value="500">
        </div>

        <button type="submit">Run AI Diagnostic</button>
    </form>
    
    <div id="status"></div>
</div>

<script>
    document.getElementById('telemetryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const statusDiv = document.getElementById('status');
        const submitBtn = document.querySelector('button');
        
        // 1. Webhook URL
        const webhookUrl = 'https://nesma2026.app.n8n.cloud/webhook-test/3903ce2a-b204-463a-930c-f53cab8c43c8';

        // 2. Gather the form data
        const payload = {
            serial_number: document.getElementById('serial').value,
            smart_5_raw: parseFloat(document.getElementById('smart_5').value),
            smart_9_raw: parseFloat(document.getElementById('smart_9').value),
            smart_187_raw: parseFloat(document.getElementById('smart_187').value),
            smart_194_raw: parseFloat(document.getElementById('smart_194').value),
            smart_197_raw: parseFloat(document.getElementById('smart_197').value)
        };

        // UI Updates
        submitBtn.innerText = 'Analyzing Telemetry...';
        submitBtn.disabled = true;
        statusDiv.style.display = 'none';

        try {
            // 3. Send the data to n8n
            const response = await fetch(webhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                statusDiv.innerText = 'Telemetry successfully transmitted to AI Agent.';
                statusDiv.className = 'success';
            } else {
                throw new Error('Network response was not ok');
            }
        } catch (error) {
            statusDiv.innerText = 'Connection Error: Could not reach n8n workflow.';
            statusDiv.className = 'error';
        } finally {
            statusDiv.style.display = 'block';
            submitBtn.innerText = 'Run AI Diagnostic';
            submitBtn.disabled = false;
        }
    });
</script>

</body>
</html>
